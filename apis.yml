aid: plandex
name: Plandex
description: >-
  Plandex is an open-source, terminal-based AI coding agent designed to take
  on large, multi-step software development tasks across many files in real
  world codebases. Written in Go and released under the MIT license, Plandex
  builds and executes long-running "plans" — durable, branchable units of
  work that combine intelligent context management, project maps generated
  with tree-sitter for 30+ programming languages, an effective 2M-token
  context window, and a cumulative diff review sandbox that isolates AI
  edits until a developer explicitly applies them. The tool ships as a CLI
  with an interactive REPL (fuzzy auto-complete), supports automated
  debugging of terminal commands and browser applications, integrates with
  Git for branching and commit-message generation, and is provider-neutral
  — working with Anthropic Claude, OpenAI, Google Gemini, OpenRouter.ai,
  and a range of open-source models. Plandex Cloud, the project's
  previously hosted offering, was wound down on October 3, 2025; Plandex
  is now distributed exclusively as a self-hosted / local-mode product
  that users run via Docker with their own model-provider API keys.
