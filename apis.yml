aid: plandex
name: Plandex
description: >-
  Plandex is an open-source, terminal-based AI coding agent designed to take on large, multi-step software development
  tasks across many files in real world codebases. Written in Go and released under the MIT license, Plandex builds and
  executes long-running "plans" — durable, branchable units of work that combine intelligent context management, project
  maps generated with tree-sitter for 30+ programming languages, an effective 2M-token context window, and a cumulative
  diff review sandbox that isolates AI edits until a developer explicitly applies them. The tool ships as a CLI with an
  interactive REPL (fuzzy auto-complete), supports automated debugging of terminal commands and browser applications,
  integrates with Git for branching and commit-message generation, and is provider-neutral — working with Anthropic
  Claude, OpenAI, Google Gemini, OpenRouter.ai, Azure OpenAI, AWS Bedrock, DeepSeek, Perplexity, Ollama, and any
  OpenAI-compatible custom provider. The Plandex Server exposes a REST management/orchestration API (over 60 endpoints
  across accounts, orgs, projects, plans, branches, context, conversation, diffs, settings, model packs, and streaming
  execution) that powers both the CLI/REPL and the hosted Plandex Cloud. Plandex Cloud is winding down as of 2025-10-03;
  Plandex is now distributed primarily as a Docker-based self-hosted / local-mode product that users run with their own
  model-provider API keys.
