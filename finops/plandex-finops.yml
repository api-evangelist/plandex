description: >-
  FinOps framework definition for Plandex. Plandex itself is MIT-licensed and
  free; the hosted Plandex Cloud (now winding down as of 2025-10-03) charged a
  subscription plus pass-through-with-markup model credits in Integrated Models
  Mode, and a flat subscription in BYO API Key Mode. The dominant ongoing cost
  for users running Plandex (cloud or self-hosted) is upstream model-provider
  consumption (OpenAI, Anthropic, OpenRouter, Google, Azure, Bedrock, DeepSeek,
  Perplexity, Relace). This document maps that surface to the FinOps Foundation
  framework and FOCUS data spec so consuming organizations can build cost
  visibility, allocation, optimization, and accountability around Plandex.
status: historical-and-active
principles:
  - name: Visibility
    description: >-
      Surface per-plan, per-branch, per-user, and per-model spend through the
      `plandex usage` command (and historical Plandex Cloud billing settings
      page) so engineering and finance can see where AI coding spend is going
      in near real time.
  - name: Allocation
    description: >-
      Tag every model call with the consuming user, plan, branch, model pack,
      role (planner / coder / builder / summarizer / verifier / context-loader),
      and upstream provider so cost can be charged back to teams.
  - name: Optimization
    description: >-
      Use the daily, cheap, oss, and planner-specialized model packs to trade
      capability for cost. Use smart-context, auto-load-context, and the
      tree-sitter file map to avoid sending unnecessary tokens. Use the
      built-in prompt caching across OpenAI, Anthropic, and Google models to
      reduce input-token cost on multi-step plans.
  - name: Accountability
    description: >-
      Establish a Plandex budget owner per org or team. Use auto-recharge,
      monthly budgets, and email notification thresholds (or the equivalent on
      self-hosted deployments) to keep spend predictable.
