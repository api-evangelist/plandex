billingModel:
  pricingCategory: Hybrid
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
  components:
    - name: Self-Hosted License
      description: MIT license — no Plandex-side fee. Upstream model-provider costs are billed by each provider directly.
      pricing: free
    - name: Plandex Cloud Subscription (BYO)
      description: $30/month flat subscription. Historical — Plandex Cloud winding down 2025-10-03.
      pricing: subscription
    - name: Plandex Cloud Subscription (Integrated)
      description: $45/month subscription including $20 of non-expiring credits. Historical — Plandex Cloud winding down 2025-10-03.
      pricing: subscription-plus-credits
    - name: Plandex Credits
      description: Pay-as-you-go usable against integrated model providers; charged at provider price plus a small markup. Historical.
      pricing: pass-through-with-markup
    - name: Upstream Provider Charges
      description: Direct charges from OpenAI, Anthropic, OpenRouter, Google AI Studio, Vertex AI, Azure OpenAI, AWS Bedrock, DeepSeek, Perplexity, Relace based on token usage.
      pricing: per-token / per-request (provider-defined)
focusColumns:
  ServiceName: Plandex
  ServiceCategory: Developer Tools / AI Coding Agent
  ProviderName: PlandexAI Inc.
  PublisherName: PlandexAI Inc.
  InvoiceIssuerName: PlandexAI Inc.
  PricingCategory: Hybrid
  PricingUnit: subscription-month / credit-usd / provider-token
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: subscription_month
    description: Active months of Plandex Cloud subscription (BYO or Integrated).
    unit: month
    aggregation: sum
    dimensions:
      - mode
      - org
      - user
  - name: plandex_credit_usage
    description: Plandex credits spent against integrated model providers.
    unit: credit-usd
    aggregation: sum
    dimensions:
      - org
      - user
      - plan
      - branch
      - upstream_provider
      - upstream_model
      - role
  - name: plandex_credit_purchase
    description: Plandex credits purchased (one-off top-up or auto-recharge).
    unit: credit-usd
    aggregation: sum
    dimensions:
      - org
      - user
  - name: upstream_input_tokens
    description: Input tokens consumed against upstream model providers when running self-hosted (or BYO) Plandex.
    unit: token
    aggregation: sum
    dimensions:
      - upstream_provider
      - upstream_model
      - plan
      - branch
      - role
      - cached
  - name: upstream_output_tokens
    description: Output tokens generated by upstream model providers.
    unit: token
    aggregation: sum
    dimensions:
      - upstream_provider
      - upstream_model
      - plan
      - branch
      - role
  - name: model_response_count
    description: Count of model responses across plans (used by Cloud BYO trial cap).
    unit: response
    aggregation: sum
    dimensions:
      - plan
      - branch
      - role
allocationTags:
  - org
  - user
  - plan
  - branch
  - model_pack
  - role
  - upstream_provider
  - environment
optimizationLevers:
  - Use the `cheap` or `oss` model pack for routine tasks; reserve `strong` / `opus-planner` / `o3-planner` for high-value planning.
  - Enable `smart-context` and `auto-load-context` so only the necessary files for each step are sent to the model.
  - Use tree-sitter file maps instead of full file bodies for very large projects.
  - Take advantage of built-in context caching across OpenAI, Anthropic, and Google models to reduce input-token cost on multi-step plans.
  - Set monthly budgets and email notification thresholds (Plandex Cloud) or external provider budgets (self-hosted) to fail safe.
  - Use OpenRouter as the failover provider to absorb transient direct-provider errors without halting plans.
