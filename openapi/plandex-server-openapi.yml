components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token issued by the Plandex server on sign-in. Used by the CLI/REPL for all authenticated API calls.
  schemas:
    Org:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        orgId:
          type: string
        createdAt:
          type: string
          format: date-time
    Plan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        projectId:
          type: string
        currentBranch:
          type: string
        contextTokens:
          type: integer
        convoTokens:
          type: integer
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Branch:
      type: object
      properties:
        name:
          type: string
        planId:
          type: string
        sha:
          type: string
        parent:
          type: string
        createdAt:
          type: string
          format: date-time
    ContextItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - file
            - directoryTree
            - directoryMap
            - url
            - note
            - image
            - pipedData
        path:
          type: string
        tokens:
          type: integer
        addedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ConvoMessage:
      type: object
      properties:
        id:
          type: string
        planId:
          type: string
        branch:
          type: string
        role:
          type: string
          enum:
            - user
            - assistant
            - system
        content:
          type: string
        createdAt:
          type: string
          format: date-time
    ModelPack:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        planner:
          type: string
        coder:
          type: string
        builder:
          type: string
        summarizer:
          type: string
        verifier:
          type: string
        contextLoader:
          type: string
    PlanConfig:
      type: object
      properties:
        autoApply:
          type: boolean
        autoCommit:
          type: boolean
        autoContinue:
          type: boolean
        autoDebug:
          type: boolean
        autoDebugTries:
          type: integer
        autoExec:
          type: boolean
        autoLoadContext:
          type: boolean
        autoUpdateContext:
          type: boolean
        canExec:
          type: boolean
        skipChangesMenu:
          type: boolean
        smartContext:
          type: boolean
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: object
security:
  - BearerAuth: []
