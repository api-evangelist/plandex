          call: plandex-plan-mgmt.renameplan
          outputParameters:
            - type: object
              mapping: $.
        - name: archive-plan
          description: Archive Plan
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: plandex-plan-mgmt.archiveplan
          outputParameters:
            - type: object
              mapping: $.
        - name: unarchive-plan
          description: Unarchive Plan
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: plandex-plan-mgmt.unarchiveplan
          outputParameters:
            - type: object
              mapping: $.
        - name: create-plan
          description: Create Plan
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: plandex-plan-mgmt.createplan
          outputParameters:
            - type: object
              mapping: $.
        - name: list-branches
          description: List Plan Branches
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: plandex-plan-mgmt.listbranches
          outputParameters:
            - type: object
