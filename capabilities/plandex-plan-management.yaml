          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: plandex-plan-mgmt.getplanconfig
          outputParameters:
            - type: object
              mapping: $.
        - name: update-plan-config
          description: Update Plan Config
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: plandex-plan-mgmt.updateplanconfig
          outputParameters:
            - type: object
